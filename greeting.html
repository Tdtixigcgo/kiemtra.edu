<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chúc mừng 8/3 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: #fdf2f8;
      min-height: 100vh;
    }

    /* ── COVER ── */
    .g-cover {
      width: 100%; height: 260px; position: relative;
      background: linear-gradient(135deg, #fbcfe8, #f9a8d4, #ec4899);
      overflow: hidden;
    }

    .g-cover img { width: 100%; height: 100%; object-fit: cover; }

    .g-cover-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.44) 100%);
    }

    .g-cover-text {
      position: absolute; bottom: 22px; left: 24px; right: 24px; color: white;
    }

    .g-pill {
      display: inline-block; font-size: 11px; font-weight: 600;
      letter-spacing: 1.2px; text-transform: uppercase;
      background: rgba(255,255,255,0.18); backdrop-filter: blur(6px);
      padding: 4px 12px; border-radius: 100px; margin-bottom: 9px;
    }

    .g-cover-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px; line-height: 1.25;
    }

    /* ── BODY ── */
    .g-body {
      max-width: 600px; margin: 0 auto; padding: 0 20px 60px;
    }

    .g-avatar-row {
      display: flex; align-items: flex-end; gap: 14px;
      margin-top: -42px; margin-bottom: 22px;
    }

    .g-avatar {
      width: 86px; height: 86px; min-width: 86px;
      border-radius: 50%;
      border: 4px solid #fdf2f8;
      overflow: hidden;
      background: linear-gradient(135deg, #fbcfe8, #ec4899);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .g-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .g-avatar .av-init { font-size: 30px; font-weight: 700; color: white; }

    .g-name-area .send-to { font-size: 12px; color: #9d174d; font-weight: 500; }
    .g-name-area .person  { font-size: 20px; font-weight: 700; color: #1f2937; line-height: 1.2; }

    /* ── CARD ── */
    .g-card {
      background: white; border: 1px solid #fce7f3;
      border-radius: 16px; padding: 24px 26px;
      box-shadow: 0 4px 20px rgba(236,72,153,0.07);
      position: relative; overflow: hidden;
    }

    .g-card::after {
      content: '"';
      position: absolute; top: 10px; right: 18px;
      font-size: 56px; color: rgba(251,207,232,0.45);
      font-family: Georgia, serif; line-height: 1;
    }

    .g-card-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.3px;
      text-transform: uppercase; color: #ec4899;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }

    .g-card-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, rgba(236,72,153,0.25), transparent);
    }

    .g-msg {
      font-size: 15px; line-height: 1.85; color: #374151;
      white-space: pre-wrap;
    }

    .g-divider { text-align: center; font-size: 26px; letter-spacing: 10px; margin: 24px 0; }

    /* ── BACK ── */
    .g-back-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: transparent; border: 1.5px solid #fce7f3;
      border-radius: 100px; padding: 9px 22px;
      font-size: 13px; font-weight: 500; color: #9d174d;
      font-family: inherit; cursor: pointer; margin: 0 auto;
      transition: background 0.2s; text-decoration: none;
    }

    .g-back-btn:hover { background: #fce7f3; }

    /* ── NO DATA ── */
    .no-data {
      text-align: center; padding: 80px 20px;
      color: #9ca3af; font-size: 15px;
    }

    .no-data a { color: #ec4899; text-decoration: none; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
  const raw = sessionStorage.getItem('greeting_data');

  if (!raw) {
    document.getElementById('app').innerHTML = `
      <div class="no-data">
        Không tìm thấy dữ liệu. <a href="index.html">← Quay lại trang kiểm tra</a>
      </div>`;
  } else {
    const { cls, user } = JSON.parse(raw);
    sessionStorage.removeItem('greeting_data'); // xoá sau khi đọc

    const avatarHTML = user.avatar
      ? `<img src="${user.avatar}" alt="avatar" onerror="this.parentElement.innerHTML='<span class=\\'av-init\\'>${user.ten.charAt(0)}</span>'">`
      : `<span class="av-init">${user.ten.charAt(0).toUpperCase()}</span>`;

    const coverHTML = cls.anh_bia
      ? `<img src="${cls.anh_bia}" alt="Ảnh bìa" onerror="this.style.display='none'">`
      : '';

    document.getElementById('app').innerHTML = `
      <div class="g-cover">
        ${coverHTML}
        <div class="g-cover-overlay"></div>
        <div class="g-cover-text">
          <span class="g-pill">✦ 8 Tháng 3 ✦</span>
          <h1>Ngày Quốc tế<br>Phụ nữ 🌸</h1>
        </div>
      </div>

      <div class="g-body">
        <div class="g-avatar-row">
          <div class="g-avatar">${avatarHTML}</div>
          <div class="g-name-area">
            <div class="send-to">Gửi đến</div>
            <div class="person">${user.ten}</div>
          </div>
        </div>

        <div class="g-card">
          <div class="g-card-label">Lời chúc</div>
          <div class="g-msg">${(user.loi_chuc || 'Chúc bạn một ngày 8/3 thật vui vẻ và hạnh phúc! 🌸').replace(/</g,'&lt;')}</div>
        </div>

        <div class="g-divider">🌷 🌸 🌺</div>

        <a class="g-back-btn" href="index.html">← Quay lại</a>
      </div>
    `;
  }
</script>
</body>
</html>
